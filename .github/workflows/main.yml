name: YT Summarizer
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL: Allows the bot to push the feed.xml
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests google-genai youtube-transcript-api

      - name: Write cookies file
        run: |
          cat <<EOF > cookies.txt
          ${{ secrets.YOUTUBE_COOKIES }}
          EOF
      
      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python script.py

      - name: Commit and Push Feed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add feed.xml
          git commit -m "Update RSS Feed" || exit 0
          git push
